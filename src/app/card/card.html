
<div class="card h-100 shadow-sm product-card">

  <img [src]="products.image" class="card-img-top" alt="product">

  <div class="card-body d-flex flex-column">

    <div class="product-badge">{{ products.category }}</div>

    <h5 class="card-title">{{products.title}}</h5>

    <p class="card-text small">
      {{products.description}}
    </p>

    <div class="product-rating">
      ★★★★☆ <span>({{ products.rating?.count || 128 }} reviews)</span>
    </div>

    <div class="product-price mt-auto mb-1">
      ${{products.price}}
    </div>

    <button class="btn-add-cart" [class.added]="added" (click)="addToCart()">
      <i class="fas" [class.fa-cart-plus]="!added" [class.fa-check]="added"></i>
      {{ added ? 'Added!' : 'Add to Cart' }}
    </button>

  </div>

</div>
